<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4e9e0" />
  <title>Negocio Kuky · Acceso</title>

  <!-- Tipografías refinadas (display serif + sans humanista) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />

  <style>
    /* ============================================
       Paleta Negocio Kuky
       Inspirada en el logo: nude, rosé, terracota suave
       ============================================ */
    :root {
      --crema:        #f8f1e9;
      --crema-clara:  #fdf8f3;
      --rose-palo:    #c89c8e;
      --rose-profundo:#a8786b;
      --terracota:    #8a5448;
      --tinta:        #3a2a25;
      --gris-suave:   #b8a89e;
      --linea:        rgba(168, 120, 107, 0.18);
      --error:        #b8413a;
      --exito:        #5e7c5b;
      --sombra-suave: 0 20px 60px -20px rgba(58, 42, 37, 0.18);
      --sombra-card:  0 8px 32px -12px rgba(168, 120, 107, 0.25);
      --radio:        18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--tinta);
      background: var(--crema);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'kern' 1, 'liga' 1;
    }

    /* ============================================
       Layout split: izquierda imagen/branding,
       derecha formulario
       ============================================ */
    .pantalla {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      grid-template-columns: 1fr;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 980px) {
      .pantalla { grid-template-columns: 1.05fr 1fr; }
    }

    /* Lado izquierdo: branding / mood */
    .branding {
      display: none;
      position: relative;
      background:
        radial-gradient(120% 80% at 20% 0%, #f0d9c8 0%, transparent 55%),
        radial-gradient(80% 60% at 80% 100%, #e8c6b3 0%, transparent 60%),
        linear-gradient(135deg, #f4e3d5 0%, #ecd0bf 100%);
      padding: 56px 64px;
      overflow: hidden;
    }
    @media (min-width: 980px) { .branding { display: flex; flex-direction: column; justify-content: space-between; } }

    /* Textura granulada sutil sobre el branding */
    .branding::before {
      content: "";
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.55 0 0 0 0 0.42 0 0 0 0 0.36 0 0 0 0.12 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.55;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    /* Hojas/elementos decorativos */
    .ornamento {
      position: absolute;
      opacity: 0.4;
      pointer-events: none;
    }
    .ornamento.uno {
      top: -40px; right: -60px;
      width: 280px; height: 280px;
      border: 1px solid var(--rose-profundo);
      border-radius: 50%;
    }
    .ornamento.dos {
      bottom: 80px; left: -100px;
      width: 200px; height: 200px;
      border: 1px solid var(--terracota);
      border-radius: 50%;
      opacity: 0.25;
    }

    .branding-header {
      position: relative;
      z-index: 2;
    }
    .marca-mini {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0.02em;
      font-size: 18px;
      color: var(--terracota);
    }
    .marca-mini::before {
      content: "";
      display: inline-block;
      width: 32px; height: 1px;
      background: var(--terracota);
      vertical-align: middle;
      margin-right: 12px;
    }

    .branding-hero {
      position: relative;
      z-index: 2;
      max-width: 460px;
    }
    .branding-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(40px, 4vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--tinta);
    }
    .branding-hero h1 em {
      font-style: italic;
      color: var(--rose-profundo);
      font-weight: 400;
    }
    .branding-hero p {
      margin-top: 22px;
      font-size: 16px;
      line-height: 1.6;
      color: var(--terracota);
      max-width: 380px;
    }

    .branding-footer {
      position: relative;
      z-index: 2;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose-profundo);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .branding-footer span:last-child::before {
      content: "·";
      margin: 0 10px;
      color: var(--gris-suave);
    }

    /* ============================================
       Lado derecho: formulario
       ============================================ */
    .panel-form {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: var(--crema);
      position: relative;
    }
    @media (min-width: 980px) {
      .panel-form { padding: 48px 64px; }
    }

    .form-wrap {
      width: 100%;
      max-width: 420px;
    }

    /* Logo en mobile (arriba del form) */
    .logo-mobile {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo-mobile img {
      width: 150px; height: auto;
      border-radius: 24px;
      box-shadow: 0 14px 36px rgba(80, 50, 110, 0.28);
    }
    @media (min-width: 980px) { .logo-mobile { display: none; } }

    /* Logo en branding (desktop, centrado) */
    .logo-branding {
      position: relative;
      z-index: 2;
      display: none;
      justify-content: center;
      align-items: center;
      flex: 1;
    }
    .logo-branding img {
      max-width: 300px;
      width: 62%;
      height: auto;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(80, 50, 110, 0.30);
    }
    @media (min-width: 980px) { .logo-branding { display: flex; } }

    h2.bienvenida {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--tinta);
      margin-bottom: 6px;
    }
    h2.bienvenida em {
      font-style: italic;
      color: var(--rose-profundo);
    }
    p.subtitulo {
      color: var(--gris-suave);
      font-size: 14px;
      margin-bottom: 36px;
      letter-spacing: 0.01em;
    }

    /* ---- Campos ---- */
    .campo {
      position: relative;
      margin-bottom: 20px;
    }
    .campo label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--rose-profundo);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .campo input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--linea);
      background: var(--crema-clara);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      color: var(--tinta);
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
      outline: none;
    }
    .campo input:hover { background: #fff; }
    .campo input:focus {
      border-color: var(--rose-profundo);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(168, 120, 107, 0.10);
    }
    .campo input::placeholder { color: #cdb9ad; }

    /* Toggle mostrar password */
    .campo.password { position: relative; }
    .toggle-pass {
      position: absolute;
      top: 32px; right: 14px;
      background: none; border: none;
      color: var(--gris-suave);
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 8px;
      transition: color .2s;
    }
    .toggle-pass:hover { color: var(--terracota); }

    /* ---- Fila checkbox + olvido ---- */
    .fila-extra {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .recordar {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--terracota);
      user-select: none;
    }
    .recordar input { accent-color: var(--rose-profundo); cursor: pointer; }
    a.olvido {
      color: var(--rose-profundo);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    a.olvido:hover { border-bottom-color: var(--rose-profundo); }

    /* ---- Botón principal ---- */
    .btn-primario {
      width: 100%;
      padding: 16px;
      background: var(--tinta);
      color: var(--crema-clara);
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s ease, transform .15s ease;
      position: relative;
    }
    .btn-primario:hover:not(:disabled) { background: var(--terracota); }
    .btn-primario:active:not(:disabled) { transform: scale(0.99); }
    .btn-primario:disabled {
      opacity: 0.6;
      cursor: wait;
    }
    .btn-primario.cargando::after {
      content: "";
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--crema-clara);
      border-top-color: transparent;
      border-radius: 50%;
      margin-left: 12px;
      vertical-align: middle;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Mensaje de error / éxito ---- */
    .mensaje {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }
    .mensaje.visible { display: block; }
    .mensaje.error {
      background: #f9e7e5;
      color: var(--error);
      border: 1px solid rgba(184, 65, 58, 0.18);
    }
    .mensaje.exito {
      background: #e6efe4;
      color: var(--exito);
      border: 1px solid rgba(94, 124, 91, 0.18);
    }

    /* ---- Pie del formulario ---- */
    .pie-form {
      text-align: center;
      margin-top: 36px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gris-suave);
    }

    /* ============================================
       Modal recuperación de contraseña
       ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(58, 42, 37, 0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay.abierto { display: flex; }
    .modal {
      background: var(--crema-clara);
      border-radius: var(--radio);
      max-width: 420px;
      width: 100%;
      padding: 36px;
      box-shadow: var(--sombra-suave);
      animation: subirModal .3s ease-out;
    }
    @keyframes subirModal {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 28px;
      color: var(--tinta);
      margin-bottom: 8px;
    }
    .modal p {
      color: var(--terracota);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .modal-acciones {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn-secundario {
      flex: 1;
      padding: 14px;
      background: transparent;
      color: var(--terracota);
      border: 1px solid var(--linea);
      border-radius: 12px;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-secundario:hover { background: var(--linea); }

    /* Animación entrada del form */
    .form-wrap > * { animation: fadeUp .6s ease-out backwards; }
    .form-wrap > *:nth-child(1) { animation-delay: .05s; }
    .form-wrap > *:nth-child(2) { animation-delay: .15s; }
    .form-wrap > *:nth-child(3) { animation-delay: .22s; }
    .form-wrap > *:nth-child(4) { animation-delay: .29s; }
    .form-wrap > *:nth-child(5) { animation-delay: .36s; }
    .form-wrap > *:nth-child(6) { animation-delay: .43s; }
    .form-wrap > *:nth-child(7) { animation-delay: .50s; }
    .form-wrap > *:nth-child(8) { animation-delay: .57s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Reducir movimiento si el usuario lo prefiere */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="pantalla">

    <!-- Panel izquierdo: branding (solo desktop) -->
    <aside class="branding" aria-hidden="true">
      <div class="ornamento uno"></div>
      <div class="ornamento dos"></div>

      <div class="branding-header">
        <span class="marca-mini">Negocio Kuky</span>
      </div>

      <div class="logo-branding">
        <img src="assets/logo.jpg" alt="Negocio Kuky" />
      </div>

      <div class="branding-footer">
        <span>Gestión integral</span>
      </div>
    </aside>

    <!-- Panel derecho: formulario -->
    <main class="panel-form">
      <div class="form-wrap">

        <!-- Logo solo en mobile -->
        <div class="logo-mobile">
          <img src="assets/logo.jpg" alt="Negocio Kuky" />
        </div>

        <h2 class="bienvenida">Bienvenido<em>.</em></h2>
        <p class="subtitulo">Ingresá a tu panel de gestión.</p>

        <form id="form-login" novalidate>

          <div class="campo">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tu@correo.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="campo password">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              minlength="6"
            />
            <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Mostrar contraseña">Ver</button>
          </div>

          <div class="fila-extra">
            <label class="recordar">
              <input type="checkbox" id="recordar" checked />
              <span>Recordarme</span>
            </label>
            <a class="olvido" id="abrir-recupero">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" id="btn-login" class="btn-primario">
            Ingresar
          </button>

          <div id="mensaje" class="mensaje" role="alert" aria-live="polite"></div>

        </form>

        <p class="pie-form">Sistema interno · Acceso restringido</p>

      </div>
    </main>
  </div>

  <!-- Modal recuperación de contraseña -->
  <div class="modal-overlay" id="modal-recupero" role="dialog" aria-modal="true" aria-labelledby="rec-titulo">
    <div class="modal">
      <h3 id="rec-titulo">Recuperar contraseña</h3>
      <p>Ingresá tu correo y te enviaremos un enlace para restablecer la contraseña.</p>

      <div class="campo">
        <label for="email-recupero">Correo electrónico</label>
        <input type="email" id="email-recupero" placeholder="tu@correo.com" autocomplete="email" />
      </div>

      <div id="mensaje-recupero" class="mensaje" role="alert" aria-live="polite"></div>

      <div class="modal-acciones">
        <button type="button" class="btn-secundario" id="cerrar-recupero">Cancelar</button>
        <button type="button" class="btn-primario" id="enviar-recupero">Enviar enlace</button>
      </div>
    </div>
  </div>

  <!-- Script de la página -->
  <script type="module">
    import { login, resetPassword, describirError, esEmailValido, onAuthChange }
      from "./js/auth.js";

    // ----- Refs -----
    const $form        = document.getElementById('form-login');
    const $email       = document.getElementById('email');
    const $password    = document.getElementById('password');
    const $recordar    = document.getElementById('recordar');
    const $btnLogin    = document.getElementById('btn-login');
    const $mensaje     = document.getElementById('mensaje');
    const $togglePass  = document.getElementById('toggle-pass');

    const $abrirRec    = document.getElementById('abrir-recupero');
    const $cerrarRec   = document.getElementById('cerrar-recupero');
    const $enviarRec   = document.getElementById('enviar-recupero');
    const $modalRec    = document.getElementById('modal-recupero');
    const $emailRec    = document.getElementById('email-recupero');
    const $msgRec      = document.getElementById('mensaje-recupero');

    // ----- Si ya hay sesión activa, ir directo al dashboard -----
    onAuthChange((user) => {
      if (user) {
        const destino = sessionStorage.getItem("redirectTo") || "dashboard.html";
        sessionStorage.removeItem("redirectTo");
        location.replace(destino);
      }
    });

    // ----- Mostrar mensaje -----
    function mostrar(el, texto, tipo) {
      el.textContent = texto;
      el.className = "mensaje visible " + tipo;
    }
    function ocultar(el) {
      el.className = "mensaje";
      el.textContent = "";
    }

    // ----- Toggle de visibilidad de password -----
    $togglePass.addEventListener('click', () => {
      const visible = $password.type === 'text';
      $password.type = visible ? 'password' : 'text';
      $togglePass.textContent = visible ? 'Ver' : 'Ocultar';
      $togglePass.setAttribute(
        'aria-label',
        visible ? 'Mostrar contraseña' : 'Ocultar contraseña'
      );
    });

    // ----- Submit del login -----
    $form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultar($mensaje);

      const email    = $email.value.trim();
      const password = $password.value;
      const recordar = $recordar.checked;

      // Validaciones de UI
      if (!email)               return mostrar($mensaje, "Ingresá tu correo electrónico.", "error");
      if (!esEmailValido(email)) return mostrar($mensaje, "El correo electrónico no es válido.", "error");
      if (!password)            return mostrar($mensaje, "Ingresá tu contraseña.", "error");

      $btnLogin.disabled = true;
      $btnLogin.classList.add('cargando');
      $btnLogin.textContent = "Ingresando";

      try {
        await login(email, password, recordar);
        // El onAuthChange se encarga de redirigir
        mostrar($mensaje, "Sesión iniciada. Redirigiendo…", "exito");
      } catch (err) {
        mostrar($mensaje, describirError(err), "error");
        $btnLogin.disabled = false;
        $btnLogin.classList.remove('cargando');
        $btnLogin.textContent = "Ingresar";
      }
    });

    // ----- Modal de recupero -----
    function abrirModal() {
      ocultar($msgRec);
      $emailRec.value = $email.value.trim();
      $modalRec.classList.add('abierto');
      setTimeout(() => $emailRec.focus(), 50);
    }
    function cerrarModal() {
      $modalRec.classList.remove('abierto');
    }

    $abrirRec.addEventListener('click', abrirModal);
    $cerrarRec.addEventListener('click', cerrarModal);
    $modalRec.addEventListener('click', (e) => {
      if (e.target === $modalRec) cerrarModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $modalRec.classList.contains('abierto')) cerrarModal();
    });

    $enviarRec.addEventListener('click', async () => {
      ocultar($msgRec);
      const email = $emailRec.value.trim();
      if (!email)                return mostrar($msgRec, "Ingresá tu correo.", "error");
      if (!esEmailValido(email)) return mostrar($msgRec, "El correo no es válido.", "error");

      $enviarRec.disabled = true;
      $enviarRec.classList.add('cargando');
      const textoOriginal = $enviarRec.textContent;
      $enviarRec.textContent = "Enviando";

      try {
        await resetPassword(email);
        mostrar($msgRec, "Listo. Si el correo está registrado, recibirás un enlace en breve.", "exito");
        setTimeout(cerrarModal, 2500);
      } catch (err) {
        mostrar($msgRec, describirError(err), "error");
      } finally {
        $enviarRec.disabled = false;
        $enviarRec.classList.remove('cargando');
        $enviarRec.textContent = textoOriginal;
      }
    });

  </script>
</body>
</html>
