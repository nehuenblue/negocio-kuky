<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emanuel-Natura | Gestión de Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 380px; border-radius: 1rem; border: 3px solid #f97316; z-index: 1; }
        .natura-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
    </style>
</head>
<body class="bg-orange-50 font-sans min-h-screen">

    <header class="natura-gradient text-white p-6 shadow-lg mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-black tracking-tighter">EMANUEL-NATURA</h1>
            <div id="stats" class="flex gap-4 text-sm font-bold">
                <div class="bg-white/20 p-2 rounded">MES: <span id="total-mes">$ 0</span></div>
                <div class="bg-white/20 p-2 rounded">PTS: <span id="total-pts">0</span></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-2 gap-8 pb-12">
        
        <div class="space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-orange-100">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="bg-orange-500 w-2 h-6 rounded mr-3"></span> Nuevo Pedido - Ciclo 07
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Código del Producto</label>
                        <input type="text" id="cod-prod" placeholder="Ej: 70402" class="w-full p-4 bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl outline-none transition-all text-lg font-mono">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2">
                            <label class="text-xs font-bold text-gray-400 uppercase ml-1">Producto</label>
                            <input type="text" id="nom-prod" class="w-full p-4 bg-gray-100 border-none rounded-2xl text-gray-600 font-medium" readonly>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase ml-1">Precio $</label>
                            <input type="text" id="pre-prod" class="w-full p-4 bg-gray-100 border-none rounded-2xl text-orange-600 font-bold" readonly>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase ml-1">Puntos</label>
                            <input type="text" id="pts-prod" class="w-full p-4 bg-gray-100 border-none rounded-2xl text-blue-600 font-bold" readonly>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Nombre del Cliente</label>
                        <input type="text" id="cliente" placeholder="¿Quién lo compró?" class="w-full p-4 border-2 border-orange-100 focus:border-orange-500 rounded-2xl outline-none">
                    </div>

                    <button id="btn-venta" class="w-full natura-gradient text-white font-black py-5 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest mt-4">
                        Registrar Venta
                    </button>
                    
                    <button id="btn-importar" class="w-full text-orange-400 text-xs font-bold py-2 hover:underline">
                        🔄 Cargar/Actualizar Catálogo Completo
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-xl border border-orange-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="font-bold text-gray-700">Ubicación de Entrega</h3>
                    <span class="text-xs text-orange-500 font-bold">ZAPALA / PEHUENIA</span>
                </div>
                <div id="map"></div>
                <p class="text-center text-[10px] text-gray-400 mt-4 uppercase tracking-widest">Toca el mapa para marcar el punto de venta</p>
            </div>
        </div>

    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
